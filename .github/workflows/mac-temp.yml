name: Temporary macOS SSH

on:
  push:
    branches:
      - main

jobs:
  check-trigger:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check commit message for trigger keyword
        id: check
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          SUBJECT=$(echo "$COMMIT_MSG" | head -1)
          echo "Subject: $SUBJECT"
          if echo "$SUBJECT" | grep -q 'start-'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "✓ Commit message contains trigger keyword"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "✗ Commit message does not contain trigger keyword"
            echo "   Skipping macOS runner (commit: ${GITHUB_SHA:0:7})"
          fi

  mac-arm64-temp:
    needs: check-trigger
    if: needs.check-trigger.outputs.should_run == 'true'
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show system info
        run: |
          uname -a
          sw_vers
          echo "Arch: $(uname -m)"

      - name: Download winload (start-winload)
        if: contains(github.event.head_commit.message, 'start-winload')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/download_winload.py
          chmod +x winload
          ./winload --help || true

      - name: Download dart-flutter-demo (start-dart-flutter-demo)
        if: contains(github.event.head_commit.message, 'start-dart-flutter-demo')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DARK_MODE: ${{ contains(github.event.head_commit.message, '--dark') && 'true' || '' }}
        run: python3 scripts/download_dart_flutter_demo.py

      - name: Install tmate
        run: brew install tmate

      - name: Rename screenshot with timestamp
        if: >
          contains(github.event.head_commit.message, 'start-dart-flutter-demo') &&
          (contains(github.event.head_commit.message, '--artifact-pic') ||
           contains(github.event.head_commit.message, '--release-pic'))
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          DARK_SUFFIX=""
          if echo "${{ github.event.head_commit.message }}" | grep -q '\-\-dark'; then
            DARK_SUFFIX="_dark"
          fi
          cp "/tmp/dart_flutter_demo_screenshot${DARK_SUFFIX}.png" "/tmp/dart_flutter_demo_screenshot${DARK_SUFFIX}_${TIMESTAMP}.png"
          echo "TIMESTAMP=${TIMESTAMP}" >> "$GITHUB_ENV"
          echo "DARK_SUFFIX=${DARK_SUFFIX}" >> "$GITHUB_ENV"

      - name: Upload screenshot to artifacts
        if: >
          contains(github.event.head_commit.message, 'start-dart-flutter-demo') &&
          (contains(github.event.head_commit.message, '--artifact-pic') ||
           contains(github.event.head_commit.message, '--release-pic'))
        uses: actions/upload-artifact@v4
        with:
          name: macos-screenshot${{ env.DARK_SUFFIX }}-${{ env.TIMESTAMP }}
          path: /tmp/dart_flutter_demo_screenshot${{ env.DARK_SUFFIX }}_${{ env.TIMESTAMP }}.png
          retention-days: 7

      - name: Upload screenshot to GitHub Release
        if: >
          contains(github.event.head_commit.message, 'start-dart-flutter-demo') &&
          contains(github.event.head_commit.message, '--release-pic')
        run: |
          DARK_SUFFIX="${DARK_SUFFIX:-}"
          TAG="screenshot${DARK_SUFFIX}-${TIMESTAMP}"
          FILENAME="dart_flutter_demo_screenshot${DARK_SUFFIX}_${TIMESTAMP}.png"
          IMAGE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${FILENAME}"
          gh release create "$TAG" \
            "/tmp/${FILENAME}" \
            --title "macOS Screenshot${DARK_SUFFIX} ${TIMESTAMP}" \
            --notes "![Screenshot](${IMAGE_URL})"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Start SSH session
        run: |
          echo "Starting SSH session..."
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready
          echo "SSH COMMAND:"
          tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'

          echo "Waiting for exit signal..."
          while true; do
            if grep -q "exit mac" ~/.bash_history 2>/dev/null; then
              echo "Exit signal detected."
              break
            fi
            sleep 5
          done

      - name: Completion notification
        run: echo "✅ macOS SSH session completed!"