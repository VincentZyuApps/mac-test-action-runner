name: Temporary macOS SSH

on:
  push:
    branches:
      - main

jobs:
  mac-temp:
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show system info
        run: |
          uname -a
          sw_vers
          echo "Arch: $(uname -m)"

      - name: Download winload (start-winload)
        if: contains(github.event.head_commit.message, 'start-winload')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/download_winload.py
          chmod +x winload
          ./winload --help || true

      - name: Download dart-flutter-demo (start-dart-flutter-demo)
        if: contains(github.event.head_commit.message, 'start-dart-flutter-demo')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/download_dart_flutter_demo.py

      - name: Install tmate
        run: brew install tmate

      - name: Start SSH session
        run: |
          echo "Starting SSH session..."
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready
          echo "SSH COMMAND:"
          tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'

          echo "Waiting for exit signal..."
          while true; do
            if grep -q "exit mac" ~/.bash_history 2>/dev/null; then
              echo "Exit signal detected."
              break
            fi
            sleep 5
          done